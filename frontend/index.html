<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>

    <!-- NeutralinoJS client library -->
    <script src="neutralino.js"></script>

    <!-- Diagnostic logs for Neutralino detection -->
    <script>
      console.log('[index.html] Page loaded');
      console.log('[index.html] window.NL_ARGS:', typeof window.NL_ARGS, window.NL_ARGS);
      console.log('[index.html] window.__NEUTRINO_ARGS__:', typeof window.__NEUTRINO_ARGS__, window.__NEUTRINO_ARGS__);
      console.log('[index.html] window.Neutralino:', typeof window.Neutralino);
      console.log('[index.html] Script tags with neutralino.js:', document.querySelectorAll('script[src*="neutralino"]').length);
    </script>

    <script>
      if (localStorage.theme === 'dark' || !('theme' in localStorage)) {
        document.querySelector('html').classList.add('dark');
        document.querySelector('html').style.colorScheme = 'dark';
      } else {
        document.querySelector('html').classList.remove('dark');
        document.querySelector('html').style.colorScheme = 'light';
      }        
    </script>      
  </head>
  <body class="font-inter antialiased bg-gray-100 dark:bg-gray-900 text-gray-600 dark:text-gray-400">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script>
        if (localStorage.getItem('sidebar-expanded') == 'true') {
            document.querySelector('body').classList.add('sidebar-expanded');
        } else {
            document.querySelector('body').classList.remove('sidebar-expanded');
        }
    </script>   
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
